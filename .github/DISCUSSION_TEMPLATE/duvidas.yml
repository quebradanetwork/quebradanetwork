title: "[Dúvida]: "
labels: ["dúvida"]
body:
  - type: markdown
    attributes:
      value: |
        Use este espaço para dúvidas, ideias e trocas com a comunidade.
        Para bugs, abra uma **issue**. Para falhas de segurança, siga o `SECURITY.md`.

  - type: input
    id: contexto
    attributes:
      label: "Projeto relacionado"
      placeholder: "ex: QFinance, qp_store, geral..."
    validations:
      required: false

  - type: textarea
    id: mensagem
    attributes:
      label: "Sua dúvida ou ideia"
      description: "Descreva com o máximo de contexto possível."
    validations:
      required: true
