name: "✨ Solicitar Funcionalidade"
description: "Sugira uma nova funcionalidade ou melhoria para um projeto da Quebrada Network."
title: "[Feature]: "
labels: ["enhancement", "triagem"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pela sugestão. Quanto mais contexto você fornecer,
        mais fácil será avaliar e priorizar a proposta.

  - type: input
    id: projeto
    attributes:
      label: "Projeto / Resource"
      description: "Para qual projeto é a sugestão?"
      placeholder: "ex: QFinance, qn_panel, garages..."
    validations:
      required: true

  - type: textarea
    id: problema
    attributes:
      label: "Qual problema isso resolve?"
      description: "Descreva a dor ou a limitação atual que motivou a sugestão."
      placeholder: "Hoje não é possível fazer X, o que obriga o usuário a Y."
    validations:
      required: true

  - type: textarea
    id: solucao
    attributes:
      label: "Solução proposta"
      description: "Descreva a funcionalidade ou melhoria desejada."
    validations:
      required: true

  - type: textarea
    id: alternativas
    attributes:
      label: "Alternativas consideradas"
      description: "Existem outras abordagens que você avaliou?"
    validations:
      required: false

  - type: dropdown
    id: prioridade
    attributes:
      label: "Prioridade sugerida"
      options:
        - "Baixa - seria bom ter"
        - "Média - agregaria valor claro"
        - "Alta - impacto significativo"
    validations:
      required: false

  - type: checkboxes
    id: verificacoes
    attributes:
      label: "Verificações"
      options:
        - label: "Pesquisei nas issues existentes e esta sugestão ainda não foi feita."
          required: true
