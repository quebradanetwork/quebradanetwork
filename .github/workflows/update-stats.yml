name: Atualizar cards de estatísticas

# Gera os cards de estatísticas como SVG estático e os commita em profile/.
# Assim o perfil não depende de um endpoint público em tempo real
# (sem rate limit, sem quedas de terceiros).

on:
  schedule:
    - cron: "0 3 * * *" # Todo dia às 03:00 UTC (00:00 BRT)
  workflow_dispatch: {} # Permite rodar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # username=yuribraga17 → mostra números reais do dev por trás da org.
      # Para exibir os cards da PRÓPRIA organização, troque por:
      #   options: username=${{ github.repository_owner }}&...
      # (obs.: cards de organização tendem a vir vazios).
      #
      # Para incluir repositórios PRIVADOS nas estatísticas, gere um PAT
      # com escopos "repo" e "read:user", salve como secret (ex.: STATS_PAT)
      # e troque token: ${{ secrets.GITHUB_TOKEN }} por ${{ secrets.STATS_PAT }}.
      # ------------------------------------------------------------------

      - name: Gerar card de estatísticas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=yuribraga17&show_icons=true&include_all_commits=true&hide_border=true&theme=github_dark&title_color=7589d5&icon_color=7589d5
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=yuribraga17&layout=compact&langs_count=8&hide_border=true&theme=github_dark&title_color=7589d5
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitar cards atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: atualiza cards de estatísticas" || exit 0
          git push
